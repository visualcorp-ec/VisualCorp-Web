<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualCorp — CRM & Kanban</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
    <!-- Dragula for Drag and Drop Kanban -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dragula/3.7.3/dragula.min.css">
    <style>
        /* Modern CRM Specific Styles */
        body {
            background: var(--color-bg);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .crm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-4) var(--sp-6);
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .crm-title {
            font-size: var(--fs-xl);
            font-weight: 800;
            color: var(--color-heading);
            margin: 0;
            display: flex;
            align-items: center;
            gap: var(--sp-3);
        }

        .crm-title i {
            color: var(--color-accent);
        }

        .crm-tools {
            display: flex;
            gap: var(--sp-3);
            align-items: center;
        }

        /* Kanban Board Grid */
        .kanban-board {
            display: flex;
            gap: var(--sp-4);
            padding: var(--sp-6);
            overflow-x: auto;
            flex: 1;
            min-height: calc(100vh - 80px);
            align-items: flex-start;
        }

        /* Kanban Column */
        .kanban-col {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            min-width: 320px;
            width: 320px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
        }

        .kanban-col__header {
            padding: var(--sp-4);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top-left-radius: var(--radius-xl);
            border-top-right-radius: var(--radius-xl);
            background: rgba(0, 0, 0, 0.2);
            font-weight: 700;
            color: var(--color-heading);
        }

        .col-count {
            background: var(--color-surface-alt);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: var(--fs-xs);
            color: var(--color-text-dim);
        }

        .kanban-col__body {
            padding: var(--sp-3);
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
        }

        /* Hover states for columns during drag */
        .gu-over {
            background: rgba(242, 183, 5, 0.05) !important;
            border-color: rgba(242, 183, 5, 0.3) !important;
        }

        /* Order Card inside Kanban */
        .kanban-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--sp-4);
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .kanban-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .kanban-card:active {
            cursor: grabbing;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--sp-2);
        }

        .card-title {
            font-size: var(--fs-sm);
            font-weight: 700;
            color: #fff;
            margin: 0;
            line-height: 1.3;
        }

        .card-price {
            font-size: var(--fs-sm);
            font-weight: 800;
            color: var(--color-accent);
            white-space: nowrap;
        }

        .card-client {
            font-size: var(--fs-xs);
            color: var(--color-text-dim);
            display: flex;
            align-items: center;
            gap: var(--sp-1);
            margin-bottom: var(--sp-3);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--color-border);
            padding-top: var(--sp-3);
            font-size: var(--fs-xs);
        }

        /* Priority Tags */
        .tag {
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tag--alta {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .tag--media {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .tag--baja {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        /* Scrollbar adjustments */
        .kanban-board::-webkit-scrollbar,
        .kanban-col__body::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .kanban-board::-webkit-scrollbar-track,
        .kanban-col__body::-webkit-scrollbar-track {
            background: transparent;
        }

        .kanban-board::-webkit-scrollbar-thumb,
        .kanban-col__body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .kanban-board::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <!-- Native app-like Header -->
    <header class="crm-header">
        <div class="crm-title">
            <i class="fa-solid fa-layer-group"></i> VisualCorp CRM
        </div>
        <div class="crm-tools">
            <div class="search-box" style="margin: 0; width: 250px;">
                <i class="fa-solid fa-magnifying-glass search-box__icon"></i>
                <input type="text" id="crmSearch" placeholder="Buscar pedido o cliente..." class="search-box__input"
                    style="padding: 6px 16px 6px 36px; border-radius: var(--radius-full);">
            </div>
            <button class="btn btn--outline" onclick="window.location.href='index.html'" title="Volver al Admin Panel">
                <i class="fa-solid fa-house"></i>
            </button>
            <button class="btn btn--primary" id="btnNewOrder">
                <i class="fa-solid fa-plus"></i> Nueva Venta (POS)
            </button>
        </div>
    </header>

    <!-- Kanban Board -->
    <div class="kanban-board" id="kanbanBoard">

        <!-- Asesoría Column -->
        <div class="kanban-col" data-stage="asesoria">
            <div class="kanban-col__header" style="border-top: 3px solid #8b5cf6;">
                <span>Asesoría / Cotizando</span>
                <span class="col-count" id="count-asesoria">0</span>
            </div>
            <div class="kanban-col__body" id="col-asesoria">
                <!-- Dropzone for Dragula -->
            </div>
        </div>

        <!-- Diseño Column -->
        <div class="kanban-col" data-stage="diseno">
            <div class="kanban-col__header" style="border-top: 3px solid #3b82f6;">
                <span>Arte & Diseño</span>
                <span class="col-count" id="count-diseno">0</span>
            </div>
            <div class="kanban-col__body" id="col-diseno">
            </div>
        </div>

        <!-- Producción / Taller Column -->
        <div class="kanban-col" data-stage="produccion">
            <div class="kanban-col__header" style="border-top: 3px solid #f59e0b;">
                <span>En Producción</span>
                <span class="col-count" id="count-produccion">0</span>
            </div>
            <div class="kanban-col__body" id="col-produccion">
            </div>
        </div>

        <!-- Listo para Entrega / Entregado Column -->
        <div class="kanban-col" data-stage="entregado">
            <div class="kanban-col__header" style="border-top: 3px solid #10b981;">
                <span>Entregado / Finalizado</span>
                <span class="col-count" id="count-entregado">0</span>
            </div>
            <div class="kanban-col__body" id="col-entregado">
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <!-- Dragula JS for drag and drop -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dragula/3.7.3/dragula.min.js"></script>
    <script src="js/crm.js"></script>
</body>

</html>
