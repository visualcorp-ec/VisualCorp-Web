<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Corp | Mis Pedidos</title>
    <link rel="icon" href="https://d1so26dimrz1o2.cloudfront.net/postgrado_files/unemi_ec/logo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <!-- Nav (inyectado) -->
    <div id="nav-container"></div>

    <main class="site-content" style="padding-top: var(--sp-12); min-height: 80vh;">
        <div class="container" style="max-width: 1200px; width:100%; margin: 0 auto; padding: 0 var(--sp-4);">
            <div
                style="background:var(--color-surface); padding:var(--sp-8); border-radius:var(--radius-lg); border:1px solid var(--color-border); box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                <div style="text-align:center; margin-bottom:var(--sp-8);">
                    <h2 style="font-size:var(--fs-2xl); margin-bottom:var(--sp-2);">📦 Mis Pedidos</h2>
                    <p style="color:var(--color-text-dim);">Rastrea el progreso de tus órdenes.</p>
                </div>

                <div id="ordersList">
                    <div style="text-align:center; padding:var(--sp-8); color:var(--color-text-dim);">
                        <i class="fa-solid fa-spinner fa-spin fa-3x"></i>
                        <p style="margin-top:var(--sp-4);">Cargando tus pedidos...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container text-center">
            <p>&copy; 2026 VisualCorp. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/mis_pedidos.js"></script>
</body>

</html>
