<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios — VisualCorp</title>
    <meta name="description"
        content="Conoce los servicios de VisualCorp: impresión de gran formato, diseño gráfico, personalización de productos y más.">
    <link rel="icon"
        href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmSKnD00M-kkEpOeoGxEL9UP7_Zfgf8Ug33Q&s">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <!-- Navegación -->
    <div id="nav-container"></div>

    <!-- Encabezado -->
    <div class="section-header reveal reveal--slide-up">
        <div class="container">
            <h1 class="fade-in">Nuestros <span
                    style="background:var(--gradient-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Servicios</span>
            </h1>
            <p class="fade-in fade-in-delay-1">Soluciones integrales de impresión, diseño y personalización para tu
                empresa o evento.</p>
        </div>
    </div>

    <!-- Grilla de Servicios -->
    <div class="container reveal reveal--slide-up" data-delay="100">
        <div class="product-grid" id="servicesDynamicGrid" style="margin-top:var(--sp-8);">
            <!-- Skeletons o Servicios desde Supabase -->
        </div>
    </div>

    <!-- CTA -->
    <section class="reveal reveal--fade" style="padding:3rem 0 5rem;text-align:center;">
        <div class="container fade-in">
            <h2 style="font-size:var(--fs-2xl);font-weight:800;color:var(--color-heading);margin-bottom:var(--sp-4);">
                ¿Listo para comenzar?</h2>
            <p style="color:var(--color-text-muted);max-width:480px;margin:0 auto var(--sp-8);font-size:var(--fs-md);">
                Cotiza tus productos ahora mismo o explora nuestro catálogo completo.
            </p>
            <a href="calculadora.html" class="btn btn--primary btn--lg">Usar Calculadora</a>
            <a href="tienda.html" class="btn btn--secondary btn--lg" style="margin-left:.75rem;">Ver Catálogo</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer reveal reveal--fade">
        <div class="container">
            <p>&copy; 2026 <strong>VisualCorp</strong>. Todos los derechos reservados. | <a href="politicas.html"
                    style="color:var(--color-accent);">Políticas</a></p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/api.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/servicios.js"></script>
