<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualCorp — Tienda</title>
    <meta name="description"
        content="Catálogo de souvenirs y productos personalizados VisualCorp. Búsqueda, filtros y carrito de compras.">
    <link rel="icon"
        href="https://d1so26dimrz1o2.cloudfront.net/uploads/avatars/g32HrUdRExn93slL9Joo4T2nYbEXrN7Pog52QeH8.jpg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="VisualCorp — Tienda de Souvenirs y Productos Personalizados">
    <meta property="og:description"
        content="Catálogo de souvenirs y productos personalizados VisualCorp. Búsqueda, filtros y carrito de compras.">
    <meta property="og:image"
        content="https://d1so26dimrz1o2.cloudfront.net/uploads/avatars/g32HrUdRExn93slL9Joo4T2nYbEXrN7Pog52QeH8.jpg">
    <meta property="og:url" content="https://visualcorp-ec.github.io/VisualCorp-Web/tienda.html">
    <meta name="keywords"
        content="souvenirs, tazas, almohadas, sublimación, productos personalizados, Milagro, Ecuador">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <div id="nav-container"></div>

    <!-- Header -->
    <section class="section-header">
        <h1>Catálogo de <span class="accent">Productos</span></h1>
        <p>Souvenirs, personalizados e imprenta. Busca, filtra y agrega al carrito.</p>
    </section>

    <!-- Barra de búsqueda + controles -->
    <section style="padding:0 0 var(--sp-6);">
        <div class="container">
            <div class="store-controls fade-in">
                <!-- Buscador -->
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass search-box__icon"></i>
                    <input type="text" id="searchInput" placeholder="Buscar productos..." class="search-box__input">
                </div>

                <!-- Ordenar -->
                <div class="sort-control">
                    <label for="sortSelect"><i class="fa-solid fa-arrow-down-wide-short"></i></label>
                    <select id="sortSelect">
                        <option value="nombre-asc">Nombre A → Z</option>
                        <option value="nombre-desc">Nombre Z → A</option>
                        <option value="precio-asc">Precio ↑ (menor a mayor)</option>
                        <option value="precio-desc">Precio ↓ (mayor a menor)</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- Contenido: categorías + grid -->
    <section style="padding:0 0 var(--sp-16);">
        <div class="container">
            <div class="store-layout">
                <!-- Sidebar categorías -->
                <aside class="store-sidebar fade-in" id="categorySidebar">
                    <h3 class="store-sidebar__title">Categorías</h3>
                    <div id="categoryList">
                        <button class="cat-btn active" data-cat="Todos">🏷️ Todos</button>
                    </div>
                </aside>

                <!-- Grid de productos -->
                <main>
                    <div class="store-info">
                        <span id="resultCount">Cargando...</span>
                    </div>
                    <div class="product-grid" id="product-grid">
                        <!-- Skeletons -->
                    </div>
                </main>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 <strong>VisualCorp</strong>. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/api.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/tienda.js"></script>
</body>

</html>
