<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Corp | Mi Perfil</title>
    <link rel="icon"
        href="https://d1so26dimrz1o2.cloudfront.net/uploads/avatars/g32HrUdRExn93slL9Joo4T2nYbEXrN7Pog52QeH8.jpg"
        type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <!-- Nav -->
    <div id="nav-container"></div>

    <main class="site-content" style="padding-top: var(--sp-12); min-height: 80vh;">
        <div class="container" style="max-width: 700px; width:100%; margin: 0 auto; padding: 0 var(--sp-4);">
            <div
                style="background:var(--color-surface); padding:var(--sp-8); border-radius:var(--radius-lg); border:1px solid var(--color-border); box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                <div style="text-align:center; margin-bottom:var(--sp-8);">
                    <div id="profileAvatar"
                        style="width:80px;height:80px;border-radius:50%;background:var(--color-accent);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#111;margin:0 auto var(--sp-4);">
                        ?</div>
                    <h2 style="font-size:var(--fs-2xl); margin-bottom:var(--sp-2);">👤 Mi Perfil</h2>
                    <p style="color:var(--color-text-dim);">Gestiona tu información personal.</p>
                </div>

                <!-- Profile Form -->
                <form id="profileForm" class="auth-form">
                    <div class="form-group">
                        <label><i class="fa-solid fa-user"></i> Nombre Completo</label>
                        <input type="text" id="profNombre" required placeholder="Tu nombre completo">
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-phone"></i> Teléfono (WhatsApp)</label>
                        <input type="tel" id="profTelefono" placeholder="0999999999">
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-envelope"></i> Email</label>
                        <input type="email" id="profEmail" disabled style="opacity:0.6; cursor:not-allowed;">
                    </div>

                    <div id="profSuccess" class="auth-success" style="display:none;"></div>
                    <div id="profError" class="auth-error" style="display:none;"></div>

                    <button type="submit" class="btn btn--primary" style="width:100%;">
                        <i class="fa-solid fa-save"></i> Guardar Cambios
                    </button>
                </form>

                <!-- Password Change -->
                <div style="margin-top:var(--sp-8); padding-top:var(--sp-6); border-top:1px solid var(--color-border);">
                    <h3 style="margin-bottom:var(--sp-4); color:var(--color-heading);"><i class="fa-solid fa-lock"></i>
                        Cambiar Contraseña</h3>
                    <form id="passwordForm" class="auth-form">
                        <div class="form-group">
                            <label>Nueva Contraseña</label>
                            <input type="password" id="profNewPassword" required minlength="6"
                                placeholder="Mínimo 6 caracteres">
                        </div>
                        <div class="form-group">
                            <label>Confirmar Nueva Contraseña</label>
                            <input type="password" id="profConfirmPassword" required minlength="6"
                                placeholder="Repite tu nueva contraseña">
                        </div>

                        <div id="passSuccess" class="auth-success" style="display:none;"></div>
                        <div id="passError" class="auth-error" style="display:none;"></div>

                        <button type="submit" class="btn btn--secondary" style="width:100%;">
                            <i class="fa-solid fa-key"></i> Actualizar Contraseña
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container text-center">
            <p>&copy; 2026 VisualCorp. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/perfil.js"></script>
</body>

</html>
